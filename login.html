<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join the Waitlist | Puplar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,wght@1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header" id="siteHeader">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-p">P</span><span>uplar</span></a>
      <nav class="main-nav">
        <a href="index.html#faqs">FAQs</a>
        <a href="index.html#contact">Contact</a>
        <a href="index.html#community">Community</a>
        <a href="index.html#documentation">Documentation</a>
        <a href="index.html#products">Products</a>
      </nav>
      <div class="header-actions">
        <a href="login.html" class="link-login">Login</a>
        <a href="login.html" class="btn-primary">Get Started</a>
      </div>
    </div>
  </header>

  <main class="container waitlist-main">
    <section class="waitlist-hero">
      <h1>Join the Waitlist</h1>
      <p>Be the first to know when we launch! Sign up now to secure your spot and receive exclusive updates.</p>
    </section>

    <section class="waitlist-form-wrap">
      <form id="waitlistForm" novalidate>
        <div class="row-2">
          <label>First Name<input name="first" required /></label>
          <label>Last Name<input name="last" required /></label>
        </div>
        <label>Phone Number (Optional)
          <div class="phone-row">
            <select name="dial">
              <option>+234</option><option>+1</option><option>+44</option><option>+27</option>
              <option>+254</option><option>+233</option><option>+91</option><option>+61</option>
              <option>+81</option><option>+49</option><option>+33</option>
            </select>
            <input type="tel" name="phone" placeholder="8012345678" />
          </div>
        </label>
        <label>Email Address
          <input type="email" name="email" placeholder="you@example.com" required />
        </label>
        <label class="verify">
          <input type="checkbox" name="verify" required /> <span>Verify you are human</span>
        </label>
        <button type="submit" class="btn-primary block" disabled>Join Waitlist</button>
      </form>
      <div id="successMsg" class="success" hidden></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
